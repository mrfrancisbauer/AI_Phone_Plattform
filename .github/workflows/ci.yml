name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Dummy secrets so config validation / tests can run without real ones.
    env:
      ENCRYPTION_KEY: '1111111111111111111111111111111111111111111111111111111111111111'
      JWT_SECRET: 'ci-secret-ci-secret-ci-secret-ci-secret'
      DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/ci'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Skip package postinstalls (Prisma engines are fetched explicitly below
      # so the step is deterministic and easy to debug).
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build shared package
        run: npm run build --workspace @ai-phone/shared

      - name: Generate Prisma client
        run: npm run db:generate --workspace @ai-phone/api

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Build dashboard
        run: npm run build --workspace @ai-phone/web
